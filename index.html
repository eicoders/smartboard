<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Board by JarFanmade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toolbar">
        <input type="color" id="colorPicker" value="#000000" title="Choose Color">
        <input type="range" id="lineWidth" min="1" max="20" value="3" title="Pen Size">
        <button id="penBtn" class="active">Pen</button>
        <button id="eraserBtn">Eraser</button>
        <button id="clearBtn">Clear Board</button>
    </div>
    
    <canvas id="smartBoard"></canvas>

    <script src="script.js"></script>
</body>
</html>
